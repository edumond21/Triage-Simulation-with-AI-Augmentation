<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOC//AI — Alert Triage Simulator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="finish-screen">
  <div class="finish-card">
    <div class="finish-logo">SOC//AI — Session Complete</div>
    <div class="finish-grade" id="finish-grade"></div>
    <div class="finish-score-big" id="finish-score-big"></div>
    <div class="finish-score-label" id="finish-score-label"></div>
    <div class="finish-stats">
      <div class="finish-stat">
        <div class="finish-stat-val" id="fin-tp">—</div>
        <div class="finish-stat-key">True Pos</div>
      </div>
      <div class="finish-stat">
        <div class="finish-stat-val" id="fin-fp">—</div>
        <div class="finish-stat-key">False Pos</div>
      </div>
      <div class="finish-stat">
        <div class="finish-stat-val" id="fin-wrong">—</div>
        <div class="finish-stat-key">Missed</div>
      </div>
    </div>
    <button class="finish-btn" id="finish-restart-btn" onclick="restartSimulator()">New Alert Queue →</button>
    <div class="finish-regen" id="finish-regen"></div>
  </div>
</div>

<div id="soc-root">
  <div class="soc-header">
    <div class="soc-brand">SOC//AI — Alert Triage Simulator</div>
    <div class="soc-status">
      <div class="status-dot"></div>
      <div class="score-badge" id="score-display">Score: 0 / 0</div>
    </div>
  </div>
  <div class="soc-body">
    <div class="alert-sidebar" id="alert-sidebar"></div>
    <div class="main-panel">
      <div class="alert-detail" id="alert-detail">
        <div class="no-alert"><div class="no-alert-text">Select an alert to begin</div></div>
      </div>
      <div class="verdict-section" id="verdict-section" style="display:none;">
        <span class="verdict-label">Your verdict:</span>
        <button class="verdict-btn btn-tp" onclick="submitVerdict('TP')">TRUE POSITIVE</button>
        <button class="verdict-btn btn-fp" onclick="submitVerdict('FP')">FALSE POSITIVE</button>
        <button class="verdict-btn btn-escalate" onclick="submitVerdict('ESCALATE')">ESCALATE</button>
      </div>
      <div class="progress-row" id="progress-row" style="display:none;">
        <div class="prog-item">Resolved: <span id="prog-resolved">0</span></div>
        <div class="prog-item" style="margin-left:auto;">TP: <span id="prog-tp">0</span></div>
        <div class="prog-item">FP: <span id="prog-fp">0</span></div>
        <div class="prog-item">Correct: <span id="prog-correct">0</span></div>
      </div>
    </div>
  </div>
</div>

<script>
let ALERTS = [];
let ALERT_POOL = [];
let trickleTimer = null;
let state = {selected:null, resolved:{}, score:0, total:0, aiData:{}, aiLoading:{}};

async function callGemini(systemText, userText) {
  const res = await fetch('https://gemini-proxy.elijahdumond.workers.dev', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({systemText, userText})
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Empty response from Gemini');
  return text;
}

async function generateAlertsWithGemini() {
  const raw = await callGemini(
    `You are a cybersecurity training content generator. You create realistic SOC alert scenarios for analyst training. Always respond with valid JSON only.`,
    `Generate exactly 15 diverse SOC triage training alerts as a JSON array. Each alert must be a realistic scenario a tier-1 analyst would encounter.

Requirements:
- Exactly 9 TRUE POSITIVES (answer:"TP") and 6 FALSE POSITIVES (answer:"FP")
- Cover all four types across the 15: "Phishing Email", "Malware / Endpoint", "Network Anomaly", "Suspicious Login / IAM"
- Mix severities: at least 2 CRITICAL, 4 HIGH, 4 MEDIUM, 2 LOW
- aiMode distribution: "verdict" for 7 alerts, "indicators" for 4, "question" for 4
- FPs should be believable: authorized scanner, known CI/CD transfer, legitimate reset, exec travel, etc.
- TPs should have realistic IOCs

Return a JSON array of 15 objects, each with EXACTLY these fields:
{
  "id": <integer 1-15>,
  "type": <"Phishing Email"|"Malware / Endpoint"|"Network Anomaly"|"Suspicious Login / IAM">,
  "severity": <"LOW"|"MEDIUM"|"HIGH"|"CRITICAL">,
  "answer": <"TP"|"FP">,
  "title": <short title max 60 chars>,
  "ts": <timestamp like "2025-06-10 14:22:31 UTC">,
  "src": <source system name>,
  "fields": <array of 5-7 objects: {"k":"field name","v":"value","s":boolean}>,
  "aiMode": <"verdict"|"indicators"|"question">,
  "explanation": <1-2 sentence educational note shown after the answer is revealed>
}

For fields: "s":true marks suspicious/anomalous fields. TP alerts should have 2-4 suspicious fields; clean FP alerts may have 0-1. Use creative, varied, realistic details.`
  );
  const parsed = JSON.parse(raw);
  if (!Array.isArray(parsed) || parsed.length === 0) throw new Error('Invalid alert data received');
  return parsed;
}

function trickleNextAlert() {
  if (ALERT_POOL.length === 0) return;
  ALERTS.push(ALERT_POOL.shift());
  renderSidebar();
  const sidebar = document.getElementById('alert-sidebar');
  const items = sidebar.querySelectorAll('.alert-item');
  if (items.length > 0) items[items.length - 1].classList.add('alert-item-new');
  if (ALERT_POOL.length > 0) trickleTimer = setTimeout(trickleNextAlert, 12000);
}

function renderLoadingState() {
  document.getElementById('alert-sidebar').innerHTML = `
    <div style="padding:24px 14px;display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div class="ai-spinner" style="width:20px;height:20px;border-width:3px;"></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#4a5568;text-align:center;line-height:1.6;">
        Generating alert queue<br>with Gemini…
      </div>
    </div>`;
  document.getElementById('alert-detail').innerHTML = `
    <div class="no-alert" style="flex-direction:column;gap:14px;">
      <div class="ai-spinner" style="width:22px;height:22px;border-width:3px;"></div>
      <div class="no-alert-text" style="color:#4a5568;">Generating randomised alert queue…</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#2a3548;">Takes about 5–10 seconds</div>
    </div>`;
  document.getElementById('verdict-section').style.display = 'none';
  document.getElementById('progress-row').style.display = 'none';
}

async function initSimulator() {
  clearTimeout(trickleTimer);
  trickleTimer = null;
  ALERTS = [];
  ALERT_POOL = [];
  renderLoadingState();
  try {
    const all = await generateAlertsWithGemini();
    ALERT_POOL = all;
    for (let i = 0; i < 3 && ALERT_POOL.length > 0; i++) ALERTS.push(ALERT_POOL.shift());
    renderSidebar();
    document.getElementById('alert-detail').innerHTML =
      '<div class="no-alert"><div class="no-alert-text">Select an alert to begin</div></div>';
    document.getElementById('progress-row').style.display = 'none';
    if (ALERT_POOL.length > 0) trickleTimer = setTimeout(trickleNextAlert, 12000);
  } catch(e) {
    document.getElementById('alert-detail').innerHTML = `
      <div class="no-alert" style="flex-direction:column;gap:10px;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#ef5350;">Failed to generate alerts</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#4a5568;max-width:280px;text-align:center;line-height:1.6;">${e.message}</div>
        <button class="result-next" onclick="initSimulator()" style="margin-top:4px;">Retry →</button>
      </div>`;
    document.getElementById('alert-sidebar').innerHTML = '';
  }
}

async function restartSimulator() {
  clearTimeout(trickleTimer);
  trickleTimer = null;
  ALERTS = [];
  ALERT_POOL = [];
  document.getElementById('finish-screen').classList.remove('visible');
  state = {selected:null, resolved:{}, score:0, total:0, aiData:{}, aiLoading:{}};
  document.getElementById('score-display').textContent = 'Score: 0 / 0';
  await initSimulator();
}

function callGeminiAPI(alertId) {
  const a = ALERTS.find(x => x.id === alertId);
  if (!a) return;
  state.aiLoading[alertId] = true;
  renderDetail();

  const fieldText = a.fields.map(f => `  ${f.k}: ${f.v}${f.s?' [FLAGGED]':''}`).join('\n');
  const modeInstructions = {
    verdict: `Give a definitive verdict. Return JSON: {"verdict":"TP" or "FP","confidence":<0-100>,"reasoning":"<2-3 sentences>","indicators":[{"text":"<label>","type":"suspicious|neutral|ok"}]} — 3-6 indicators.`,
    indicators: `Highlight suspicious indicators without a final verdict. Return JSON: {"verdict":"REVIEW","confidence":<0-100>,"reasoning":"<2-3 sentences>","indicators":[{"text":"<label>","type":"suspicious|neutral|ok"}]} — 4-7 indicators.`,
    question: `Express uncertainty and ask for context. Return JSON: {"verdict":"UNCERTAIN","confidence":<0-100>,"reasoning":"<2-3 sentences>","indicators":[{"text":"<label>","type":"suspicious|neutral|ok"}],"question":"<one specific question>","options":["<opt1>","<opt2>","<opt3>"]} — 2-4 indicators, exactly 3 options.`
  };

  callGemini(
    `You are an AI-powered SOC analyst assistant in a training simulator. Analyze security alerts and provide structured analysis. Respond with valid JSON only — no preamble, no markdown.`,
    `Alert Type: ${a.type}\nSeverity: ${a.severity}\nTitle: ${a.title}\nTimestamp: ${a.ts}\nSource: ${a.src}\n\nAlert Fields:\n${fieldText}\n\nMode: ${a.aiMode.toUpperCase()}\n${modeInstructions[a.aiMode]}`
  ).then(raw => {
    state.aiLoading[alertId] = false;
    try { state.aiData[alertId] = JSON.parse(raw); }
    catch(e) { state.aiData[alertId] = {error:true}; }
    if (state.selected === alertId) renderDetail();
  }).catch(() => {
    state.aiLoading[alertId] = false;
    state.aiData[alertId] = {error:true};
    if (state.selected === alertId) renderDetail();
  });
}

function showFinishScreen() {
  const total = ALERTS.length;
  const pct = Math.round((state.score / total) * 100);
  const grade = pct >= 90 ? 'ELITE ANALYST' : pct >= 75 ? 'SOLID ANALYST' : pct >= 50 ? 'DEVELOPING SKILLS' : 'NEEDS TRAINING';
  const gradeColor = pct >= 90 ? '#66bb6a' : pct >= 75 ? '#4fc3f7' : pct >= 50 ? '#ffa726' : '#ef5350';
  const vals = Object.values(state.resolved);
  const tpMarked = vals.filter(r => r.verdict === 'TP' || r.verdict === 'ESCALATE').length;
  const fpMarked = vals.filter(r => r.verdict === 'FP').length;

  document.getElementById('finish-grade').textContent = grade;
  document.getElementById('finish-grade').style.color = gradeColor;
  document.getElementById('finish-score-big').textContent = `${state.score}/${total}`;
  document.getElementById('finish-score-big').style.color = gradeColor;
  document.getElementById('finish-score-label').textContent = `${pct}% accuracy`;
  document.getElementById('fin-tp').textContent = tpMarked;
  document.getElementById('fin-fp').textContent = fpMarked;
  document.getElementById('fin-wrong').textContent = total - state.score;
  document.getElementById('finish-regen').textContent = '';
  document.getElementById('finish-restart-btn').disabled = false;
  document.getElementById('finish-screen').classList.add('visible');
}

function renderSidebar() {
  const el = document.getElementById('alert-sidebar');
  const total = ALERTS.length + ALERT_POOL.length;
  const incomingTag = ALERT_POOL.length > 0
    ? ` <span style="color:#4a5568;font-size:10px;font-weight:400;">${ALERT_POOL.length} incoming…</span>` : '';
  el.innerHTML = `<div class="sidebar-label">Alert Queue (${ALERTS.length}/${total})${incomingTag}</div>`;
  ALERTS.forEach(a => {
    const r = state.resolved[a.id];
    let cls = 'alert-item';
    if (state.selected === a.id) cls += ' active';
    if (r) cls += a.answer === 'FP' ? ' res-fp' : ' res-tp';
    const mark = r ? `<span class="res-mark" style="color:${r.correct?'#66bb6a':'#ef5350'}">${r.correct?'✓':'✗'}</span>` : '';
    el.innerHTML += `<div class="${cls}" onclick="selectAlert(${a.id})">
      <div class="alert-severity sev-${a.severity.toLowerCase()}">${a.severity}</div>
      <div class="alert-title-short">${a.title}</div>
      <div class="alert-type-tag">${a.type}</div>${mark}
    </div>`;
  });
}

function selectAlert(id) {
  state.selected = id;
  renderSidebar();
  renderDetail();
  if (!state.aiData[id] && !state.aiLoading[id]) callGeminiAPI(id);
}

function renderDetail() {
  const a = ALERTS.find(x => x.id === state.selected);
  if (!a) {
    document.getElementById('alert-detail').innerHTML = '<div class="no-alert"><div class="no-alert-text">Select an alert to begin</div></div>';
    return;
  }
  const resolved = state.resolved[a.id];
  document.getElementById('verdict-section').style.display = resolved ? 'none' : 'flex';
  document.getElementById('progress-row').style.display = 'flex';

  const fieldsHtml = a.fields.map(f =>
    `<div class="data-row"><span class="data-key">${f.k}</span><span class="data-val ${f.s?'suspicious':''}">${f.v}</span></div>`
  ).join('');

  document.getElementById('alert-detail').innerHTML = `
    <div style="position:relative;">
      <div class="detail-title">${a.title}</div>
      <div class="detail-meta">${a.ts} &nbsp;·&nbsp; ${a.src} &nbsp;·&nbsp; ${a.type}</div>
      <div class="data-table">
        <div class="data-table-header">Alert Fields</div>
        ${fieldsHtml}
      </div>
      ${renderAIPanel(a)}
      ${resolved ? renderResultOverlay(a, resolved) : ''}
    </div>`;

  updateProgress();
}

function renderAIPanel(a) {
  const loading = state.aiLoading[a.id];
  const ai = state.aiData[a.id];
  const modeLabel = {verdict:'MODE: VERDICT + REASON', indicators:'MODE: INDICATOR HIGHLIGHT', question:'MODE: GUIDED INQUIRY'}[a.aiMode];

  let inner = '';
  if (loading || (!ai && state.aiLoading[a.id] !== false)) {
    inner = `<div class="ai-loading"><div class="ai-spinner"></div><span>Gemini is analyzing this alert…</span></div>`;
  } else if (!ai) {
    inner = `<div class="ai-loading"><div class="ai-spinner"></div><span>Connecting to Gemini API…</span></div>`;
  } else if (ai.error) {
    inner = `<div class="ai-loading" style="color:#ef5350;">AI analysis unavailable for this alert.</div>`;
  } else {
    const conf = ai.confidence || 50;
    const confClass = conf >= 85 ? 'conf-high' : conf >= 60 ? 'conf-med' : 'conf-low';
    const vcls = ai.verdict === 'TP' ? 'verdict-tp' : ai.verdict === 'FP' ? 'verdict-fp' : 'verdict-uncertain';
    const vLabel = ai.verdict === 'REVIEW' ? 'REVIEW' : ai.verdict === 'UNCERTAIN' ? 'UNCERTAIN' : ai.verdict || 'UNCERTAIN';

    const verdictRow = `<div class="ai-verdict-row">
      <div class="verdict-chip ${vcls}">${vLabel}</div>
      <div class="confidence-bar-wrap"><div class="confidence-bar ${confClass}" style="width:${conf}%"></div></div>
      <div class="confidence-label">${conf}%</div>
    </div>`;

    const indicators = (ai.indicators || []).map(i =>
      `<span class="indicator-tag ind-${i.type||'neutral'}">${i.text}</span>`
    ).join('');

    const questionBlock = a.aiMode === 'question' && ai.question ? `<div class="ai-question">
      <p>${ai.question}</p>
      <div class="ai-q-buttons">${(ai.options||[]).map(o =>
        `<button class="ai-q-btn" onclick="this.parentElement.parentElement.innerHTML='<p style=color:#66bb6a;font-family:JetBrains Mono,monospace;font-size:12px>Context noted: \\'${o.replace(/'/g,"\\'")}\\' — proceed with your verdict.</p>'">${o}</button>`
      ).join('')}</div>
    </div>` : '';

    inner = `${verdictRow}
      <div class="ai-reasoning">${ai.reasoning||''}</div>
      ${indicators ? `<div class="ai-indicators">${indicators}</div>` : ''}
      ${questionBlock}`;
  }

  return `<div class="ai-panel">
    <div class="ai-panel-header">
      <div class="ai-icon">◈</div>
      <div class="ai-label">AI Analyst — Live</div>
      <div class="ai-mode-badge">${modeLabel}</div>
    </div>
    <div class="ai-body">${inner}</div>
  </div>`;
}

function renderResultOverlay(a, resolved) {
  return `<div class="result-overlay">
    <div class="result-title" style="color:${resolved.correct?'#66bb6a':'#ef5350'}">${resolved.correct?'Correct':'Incorrect'}</div>
    <div class="result-sub">This was a <strong>${a.answer}</strong>. You marked ${resolved.verdict}.</div>
    <div class="explain-block">${a.explanation}</div>
    <button class="result-next" onclick="nextAlert()">Next alert →</button>
  </div>`;
}

function submitVerdict(verdict) {
  const a = ALERTS.find(x => x.id === state.selected);
  if (!a || state.resolved[a.id]) return;
  const correct = verdict === a.answer || (verdict === 'ESCALATE' && a.answer === 'TP');
  state.resolved[a.id] = {verdict, correct};
  state.total++;
  if (correct) state.score++;
  document.getElementById('score-display').textContent = `Score: ${state.score} / ${state.total}`;
  renderSidebar();
  renderDetail();
  if (ALERT_POOL.length === 0 && Object.keys(state.resolved).length === ALERTS.length) {
    setTimeout(showFinishScreen, 1400);
  }
}

function nextAlert() {
  const next = ALERTS.find(a => !state.resolved[a.id]);
  if (next) selectAlert(next.id);
}

function updateProgress() {
  const vals = Object.values(state.resolved);
  document.getElementById('prog-resolved').textContent = vals.length;
  document.getElementById('prog-tp').textContent = vals.filter(r => r.verdict === 'TP' || r.verdict === 'ESCALATE').length;
  document.getElementById('prog-fp').textContent = vals.filter(r => r.verdict === 'FP').length;
  document.getElementById('prog-correct').textContent = state.score;
}

initSimulator();
</script>
</body>
</html>
